<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Toolkit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='search.png') }}">
</head>
<body>

<canvas id="matrix"></canvas>

<div class="content">
    <div class="container">
        <header class="hero">
            <h1>🌍 Network Toolkit</h1>
            <p>Handy tools for your networking testing</p>
        </header>

        <div class="result-section">
            <h2>📡 Enter your input here</h2>
            <form id="quickToolForm">
                <input type="text" id="targetInput" placeholder="Enter IP / Domain / URL" required>

                <div class="select-wrapper">
                    <div class="selected" id="selectedBox">
                        <span id="selectedText">📡 Ping</span>
                        <span class="arrow" id="arrow">▼</span>
                    </div>

                    <div class="options" id="optionsBox">
                        <div class="option" data-value="ping">📡 Ping</div>
                        <div class="option" data-value="tracert">🛣 Traceroute</div>
                        <div class="option" data-value="nslookup">🔍 NSLookup</div>
                        <div class="option" data-value="portscan">🚪 Port Scan</div>
                        <div class="option" data-value="geoip">🌍 GeoIP Lookup</div>
                        <div class="option" data-value="http_headers">📄 HTTP Headers</div>
                        <div class="option" data-value="ssl_check">🔐 SSL Check</div>
                    </div>
                </div>

                <button type="submit">Run</button>
            </form>

            <div class="output-box">
                <h3>📄 Results</h3>
                <pre id="resultOutput">Waiting for input...</pre>
            </div>
        </div>
    </div>
</div>

<script>
// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const lettersArray = letters.split("");
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#11ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = lettersArray[Math.floor(Math.random() * lettersArray.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}

setInterval(drawMatrix, 35);

window.addEventListener("resize", () => {
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
});
</script>

<script>
// CUSTOM DROPDOWN
const selectedBox = document.getElementById("selectedBox");
const optionsBox = document.getElementById("optionsBox");
const selectedText = document.getElementById("selectedText");
const arrow = document.getElementById("arrow");
const options = document.querySelectorAll(".option");

let selectedTool = "ping";

selectedBox.addEventListener("click", () => {
    optionsBox.classList.toggle("show");
    arrow.classList.toggle("open");
});

options.forEach(option => {
    option.addEventListener("click", () => {
        selectedText.textContent = option.textContent;
        selectedTool = option.dataset.value;
        optionsBox.classList.remove("show");
        arrow.classList.remove("open");
    });
});

document.addEventListener("click", (e) => {
    if (!e.target.closest(".select-wrapper")) {
        optionsBox.classList.remove("show");
        arrow.classList.remove("open");
    }
});
</script>

<script>
// FORM SUBMIT
document.getElementById("quickToolForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const target = document.getElementById("targetInput").value.trim();
    const output = document.getElementById("resultOutput");

    if (!target) {
        output.textContent = "Please enter a target.";
        return;
    }

    output.textContent = "Running " + selectedTool + "...";

    try {
        const response = await fetch(`/${selectedTool}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                host: target,
                url: target
            })
        });

        const result = await response.text();
        output.textContent = result;
    } catch (error) {
        output.textContent = "Error: " + error.message;
    }
});
</script>

</body>
</html>
